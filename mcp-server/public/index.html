<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAP CPI Monitoring — Connections</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>SAP CPI Monitoring</h1>
        <p class="tenant">Manage your Integration Suite connections</p>
      </div>
    </header>

    <main>
      <!-- Saved connections -->
      <section class="panel">
        <h2>Your connections <span id="connCount" class="pill">0</span></h2>
        <div id="connList" class="conn-list">
          <p class="empty">No connections yet. Add one below.</p>
        </div>
      </section>

      <!-- Add a connection -->
      <section class="panel">
        <h2>Add a connection</h2>

        <div class="uploader" id="dropZone">
          <input type="file" id="fileInput" accept="application/json,.json" hidden />
          <p>
            <strong>Upload the service-key JSON</strong>
            <span class="muted">(the file containing <code>clientid</code>, <code>clientsecret</code>, <code>url</code>, <code>tokenurl</code>)</span>
          </p>
          <button class="btn" id="browseBtn" type="button">Choose file…</button>
          <span id="fileName" class="muted"></span>
          <p class="muted small">Drag &amp; drop the JSON here, or fill the fields manually below.</p>
        </div>

        <form id="connForm" class="form" autocomplete="off">
          <div class="field">
            <label for="name">Connection name</label>
            <input type="text" id="name" placeholder="e.g. Trial tenant" />
          </div>
          <div class="field">
            <label for="apiBaseUrl">API Base URL <span class="muted">(url)</span></label>
            <input type="text" id="apiBaseUrl" placeholder="https://<tenant>.it-cpitrial05.cfapps.us10-001.hana.ondemand.com" />
          </div>
          <div class="field">
            <label for="tokenUrl">Token URL <span class="muted">(tokenurl)</span></label>
            <input type="text" id="tokenUrl" placeholder="https://<subdomain>.authentication.us10.hana.ondemand.com/oauth/token" />
          </div>
          <div class="field">
            <label for="clientId">Client ID <span class="muted">(clientid)</span></label>
            <input type="text" id="clientId" placeholder="sb-xxxx...!bNNNN|it!bNNNN" />
          </div>
          <div class="field">
            <label for="clientSecret">Client Secret <span class="muted">(clientsecret)</span></label>
            <input type="password" id="clientSecret" placeholder="••••••••" />
          </div>

          <div class="form-actions">
            <button type="button" id="testBtn" class="btn">Test connection</button>
            <button type="button" id="saveBtn" class="btn primary" disabled>Save connection</button>
          </div>
          <div id="formStatus" class="status hidden"></div>
        </form>
      </section>
    </main>

    <script src="connections.js"></script>
  </body>
</html>
